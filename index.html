<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>360 CBD · Prospectos</title>

<link rel="icon" type="image/png" href="./logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root {
    --brand: #B83A45;
    --brand-deep: #8A2A33;
    --brand-soft: #FCE4E8;
    --brand-softer: #FEF1F3;
    --bg: #F5F5F7;
    --paper: #FFFFFF;
    --ink: #2C2C2E;
    --ink-soft: #5C5C5E;
    --mute: #8E8E93;
    --rule: #E5E5EA;
    --rule-strong: #C7C7CC;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --state-interes: #B83A45;
    --state-visitado: #2D7D4A;
    --state-potencial: #C68B2A;
    --state-descartado: #8E8E93;
    --prio-alta: #C72A2A;
    --prio-media: #C68B2A;
    --prio-baja: #8E8E93;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* HEADER al estilo 360 CBD */
  .topbar {
    background: var(--paper);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }

  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-logo { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
  .brand-text { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .brand-name { color: var(--brand); font-weight: 700; font-size: 18px; letter-spacing: -0.01em; white-space: nowrap; }
  .brand-sep { color: var(--rule-strong); font-weight: 300; }
  .brand-module { color: var(--ink-soft); font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .vendor-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 10px;
    background: var(--brand-soft);
    color: var(--brand-deep);
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* TABS */
  .mode-tabs {
    display: flex;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
    padding: 6px 8px;
    gap: 4px;
  }

  .mode-tab {
    flex: 1;
    padding: 10px 12px;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mode-tab.active { background: var(--brand-soft); color: var(--brand); font-weight: 600; }
  .mode-tab:not(.active):hover { background: var(--bg); color: var(--ink); }
  .mode-tab .count {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--brand); color: var(--paper);
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    font-weight: 700; min-width: 18px;
  }
  .mode-tab:not(.active) .count { background: var(--mute); }

  /* SEARCH */
  .search-row {
    padding: 10px 12px;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: all 0.15s;
  }
  .search-input:focus { border-color: var(--brand); background: var(--paper); box-shadow: 0 0 0 3px var(--brand-softer); }
  .search-input::placeholder { color: var(--mute); }

  .autocomplete { position: absolute; top: 100%; left: 12px; right: 84px; background: var(--paper); border: 1px solid var(--rule); border-top: none; border-radius: 0 0 8px 8px; max-height: 220px; overflow-y: auto; z-index: 1000; display: none; box-shadow: var(--shadow-md); margin-top: -2px; }
  .autocomplete.show { display: block; }
  .autocomplete-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--rule); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .autocomplete-item:hover { background: var(--bg); }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-count { font-size: 11px; color: var(--mute); background: var(--bg); padding: 2px 8px; border-radius: 10px; }

  /* BUTTONS */
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--brand); color: var(--paper); }
  .btn-primary:hover { background: var(--brand-deep); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule-strong); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { background: transparent; color: var(--prio-alta); border: 1px solid var(--prio-alta); }
  .btn-danger:hover { background: var(--prio-alta); color: var(--paper); }

  /* MAP */
  #map { flex: 1; min-height: 200px; background: #ddd; z-index: 1; }
  .leaflet-container { font-family: 'DM Sans', sans-serif; }

  /* FILTERS */
  .filters {
    background: var(--paper);
    border-top: 1px solid var(--rule);
    padding: 10px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { height: 0; }

  .filter-chip {
    padding: 6px 12px;
    border: 1px solid var(--rule);
    border-radius: 16px;
    background: var(--paper);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .filter-chip:hover:not(.active) { border-color: var(--ink); color: var(--ink); }

  /* RESULTS HEADER */
  .results-header {
    background: var(--paper);
    border-top: 1px solid var(--rule);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .results-count { font-size: 15px; font-weight: 600; color: var(--ink); }
  .results-count strong { color: var(--brand); }
  .results-meta { font-size: 11px; color: var(--mute); font-weight: 500; }

  /* RESULTS LIST */
  .results-wrap {
    background: var(--paper);
    overflow-y: auto;
    max-height: 35vh;
    flex-shrink: 0;
    border-top: 1px solid var(--rule);
    -webkit-overflow-scrolling: touch;
  }
  .salon-row {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    transition: background 0.1s;
  }
  .salon-row:hover { background: var(--bg); }
  .salon-row.highlighted { background: var(--brand-softer); }

  .save-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    font-size: 18px; color: var(--mute);
    flex-shrink: 0; padding: 0; font-weight: 600;
  }
  .save-btn:hover { border-color: var(--ink); color: var(--ink); }
  .save-btn.saved { border-color: transparent; color: var(--paper); font-size: 16px; }
  .save-btn.state-interes { background: var(--state-interes); }
  .save-btn.state-visitado { background: var(--state-visitado); }
  .save-btn.state-potencial { background: var(--state-potencial); }
  .save-btn.state-descartado { background: var(--state-descartado); }

  .salon-name { font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 3px; }
  .salon-meta { font-size: 12px; color: var(--ink-soft); line-height: 1.4; }
  .salon-meta .sep { color: var(--rule-strong); margin: 0 5px; }
  .salon-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
  .salon-comment { font-size: 12px; color: var(--ink-soft); margin-top: 8px; padding: 8px 10px; background: var(--bg); border-radius: 6px; line-height: 1.45; }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    background: var(--bg);
    color: var(--ink-soft);
    border-radius: 4px;
    letter-spacing: 0.02em;
  }
  .tag-hair { background: #FDF1E6; color: #8B5A1E; }
  .tag-nails { background: #FBE9EF; color: #A0294A; }
  .tag-barber { background: #E8EEF5; color: #2B4A6E; }
  .tag-beauty { background: #F0EAE5; color: #6B4A38; }
  .tag-state { color: var(--paper); }
  .tag-state.state-interes { background: var(--state-interes); }
  .tag-state.state-visitado { background: var(--state-visitado); }
  .tag-state.state-potencial { background: var(--state-potencial); }
  .tag-state.state-descartado { background: var(--state-descartado); }
  .tag-prio { display: inline-flex; align-items: center; gap: 4px; background: var(--paper); border: 1px solid var(--rule); }
  .tag-prio::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .tag-prio.alta::before { background: var(--prio-alta); }
  .tag-prio.media::before { background: var(--prio-media); }
  .tag-prio.baja::before { background: var(--prio-baja); }

  .salon-score { text-align: right; min-width: 50px; }
  .score-value { font-size: 18px; font-weight: 700; color: var(--brand); line-height: 1; }
  .score-value.muted { color: var(--mute); font-size: 14px; font-weight: 500; }
  .score-reviews { font-size: 10px; color: var(--mute); margin-top: 3px; font-weight: 500; }

  /* EXPORT BAR */
  .export-bar {
    background: var(--paper);
    border-top: 1px solid var(--rule);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .export-bar .btn-primary { flex: 1; }

  /* POPUP */
  .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: var(--shadow-md); padding: 0; }
  .leaflet-popup-content { margin: 0; padding: 14px; min-width: 220px; }
  .popup-name { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .popup-meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; line-height: 1.4; }
  .popup-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--rule); }
  .popup-actions a, .popup-actions button {
    flex: 1; text-align: center; padding: 7px 8px;
    background: var(--bg); color: var(--ink);
    text-decoration: none; font-family: inherit;
    font-size: 11px; font-weight: 600;
    border-radius: 6px; transition: all 0.15s;
    border: none; cursor: pointer;
  }
  .popup-actions a:hover, .popup-actions button:hover { background: var(--brand); color: var(--paper); }

  /* MARKERS */
  .custom-marker {
    background: var(--brand);
    width: 30px; height: 30px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2.5px solid var(--paper);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .custom-marker.prospect { background: var(--brand); }
  .custom-marker.here { background: #1F5FAA; }
  .custom-marker.state-interes { background: var(--state-interes); }
  .custom-marker.state-visitado { background: var(--state-visitado); }
  .custom-marker.state-potencial { background: var(--state-potencial); }
  .custom-marker.state-descartado { background: var(--state-descartado); }
  .custom-marker span {
    transform: rotate(45deg);
    color: var(--paper);
    font-size: 11px; font-weight: 700;
  }

  .empty {
    padding: 50px 20px;
    text-align: center;
    color: var(--mute);
    font-size: 14px;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9000;
    display: none;
    align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.show { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper);
    width: 100%; max-width: 480px;
    max-height: 92vh; overflow-y: auto;
    border-top-left-radius: 16px; border-top-right-radius: 16px;
    animation: slideUp 0.25s;
  }
  @keyframes slideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
  @media (min-width: 640px) {
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 12px; }
  }

  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1.3; }
  .modal-subtitle { font-size: 12px; color: var(--mute); margin-top: 4px; line-height: 1.4; }
  .modal-close {
    background: var(--bg); border: none;
    font-size: 18px; color: var(--ink-soft);
    cursor: pointer; padding: 0; line-height: 1;
    flex-shrink: 0; width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--rule); color: var(--ink); }

  .modal-body { padding: 18px 20px; }
  .modal-section { margin-bottom: 20px; }
  .modal-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--mute);
    margin-bottom: 10px; display: block; font-weight: 600;
  }
  .modal-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .modal-opt {
    padding: 9px 14px;
    border: 1.5px solid var(--rule);
    border-radius: 20px;
    background: var(--paper);
    font-size: 13px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer;
    transition: all 0.15s; user-select: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .modal-opt:hover { border-color: var(--ink); color: var(--ink); }
  .modal-opt.active { color: var(--paper); border-color: transparent; }
  .modal-opt.active.state-interes { background: var(--state-interes); }
  .modal-opt.active.state-visitado { background: var(--state-visitado); }
  .modal-opt.active.state-potencial { background: var(--state-potencial); }
  .modal-opt.active.state-descartado { background: var(--state-descartado); }
  .modal-opt.active.prio-alta { background: var(--prio-alta); }
  .modal-opt.active.prio-media { background: var(--prio-media); }
  .modal-opt.active.prio-baja { background: var(--prio-baja); }

  .modal-textarea {
    width: 100%; min-height: 80px;
    padding: 12px 14px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
    outline: none; resize: vertical;
    line-height: 1.45;
  }
  .modal-textarea:focus { border-color: var(--brand); background: var(--paper); box-shadow: 0 0 0 3px var(--brand-softer); }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--rule);
    display: flex; gap: 8px;
    background: var(--bg);
    position: sticky; bottom: 0;
  }
  .modal-footer .btn-primary { flex: 1; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    padding: 12px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    z-index: 9999;
    box-shadow: var(--shadow-md);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.92);
    display: none;
    align-items: center; justify-content: center;
    z-index: 9998;
    color: var(--ink);
    font-size: 15px; font-weight: 500;
  }
  .loading-overlay.show { display: flex; }
  .loading-overlay::after {
    content: ''; width: 5px; height: 5px;
    background: var(--brand);
    border-radius: 50%;
    margin-left: 8px;
    animation: dot 1.2s infinite;
  }
  @keyframes dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  @media (max-width: 480px) {
    .brand-module { font-size: 13px; }
    #map { min-height: 32vh; }
    .results-wrap { max-height: 32vh; }
    .mode-tab { font-size: 12px; padding: 9px 8px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="./logo.png" alt="360 CBD" class="brand-logo" onerror="this.style.display='none'">
    <div class="brand-text">
      <span class="brand-name">360 CBD</span>
      <span class="brand-sep">·</span>
      <span class="brand-module">Prospectos</span>
    </div>
  </div>
  <span class="vendor-pill" id="vendorPill">VENDEDOR</span>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" data-mode="barrio">Buscar barrio</button>
  <button class="mode-tab" data-mode="cerca">Cerca de mí</button>
  <button class="mode-tab" data-mode="mia">Mi lista <span class="count" id="miListaCount">0</span></button>
</div>

<div class="search-row" id="searchRow">
  <input type="text" class="search-input" id="searchInput" placeholder="Pocitos, Punta Carretas, Centro…" autocomplete="off">
  <button class="btn btn-primary" id="searchBtn">Buscar</button>
  <div class="autocomplete" id="autocomplete"></div>
</div>

<div id="map"></div>

<div class="filters" id="filters">
  <span class="filter-chip active" data-filter="tipo" data-value="all">Todos</span>
  <span class="filter-chip" data-filter="tipo" data-value="hair">Hair</span>
  <span class="filter-chip" data-filter="tipo" data-value="nails">Nails</span>
  <span class="filter-chip" data-filter="tipo" data-value="barber">Barber</span>
  <span class="filter-chip" data-filter="tipo" data-value="beauty">Beauty</span>
  <span style="border-left:1px solid var(--rule); margin: 0 4px;"></span>
  <span class="filter-chip" data-filter="rating" data-value="4.5">★ 4.5+</span>
  <span class="filter-chip" data-filter="rating" data-value="4.0">★ 4.0+</span>
  <span class="filter-chip" data-filter="reviews" data-value="50">50+ reviews</span>
  <span class="filter-chip" data-filter="reviews" data-value="100">100+ reviews</span>
</div>

<div class="results-header">
  <div class="results-count"><strong id="resultCount">0</strong> salones</div>
  <div class="results-meta" id="resultMeta">Cargando datos…</div>
</div>

<div class="results-wrap" id="resultsWrap">
  <div class="empty">Cargando datos…</div>
</div>

<div class="export-bar">
  <button class="btn btn-primary" id="exportBtn">Exportar PDF</button>
  <button class="btn btn-ghost" id="sortBtn">Ordenar</button>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <div style="min-width:0;flex:1;">
        <div class="modal-title" id="modalTitle">Salón</div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <span class="modal-label">Estado</span>
        <div class="modal-options" id="estadoOptions">
          <span class="modal-opt state-interes" data-estado="Interés">★ Interés</span>
          <span class="modal-opt state-visitado" data-estado="Visitado">✓ Visitado</span>
          <span class="modal-opt state-potencial" data-estado="Potencial">⚡ Potencial</span>
          <span class="modal-opt state-descartado" data-estado="Descartado">✕ Descartado</span>
        </div>
      </div>
      <div class="modal-section">
        <span class="modal-label">Prioridad</span>
        <div class="modal-options" id="prioOptions">
          <span class="modal-opt prio-alta" data-prio="Alta">Alta</span>
          <span class="modal-opt prio-media" data-prio="Media">Media</span>
          <span class="modal-opt prio-baja" data-prio="Baja">Baja</span>
        </div>
      </div>
      <div class="modal-section">
        <span class="modal-label">Comentario</span>
        <textarea class="modal-textarea" id="modalComentario" placeholder="Notas, contacto, observaciones…" maxlength="500"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="modalSave">Guardar</button>
      <button class="btn btn-danger" id="modalDelete" style="display:none;">Eliminar</button>
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading">Generando PDF</div>

<script>
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyASrQmFf-HU3eCPkhVri_OWPUmWB6ZL6hIECc27FTXsnn_ByVaOXWmzFhwAROhX-M0xQ/exec';

const DATA_URL = './data.json';
const DEFAULT_CENTER = [-34.9011, -56.1645];
const DEFAULT_ZOOM = 13;
const NEARBY_RADIUS_KM = 3;

const MVD_BARRIOS = [
  ['Pocitos', -34.910, -56.155], ['Punta Carretas', -34.922, -56.163], ['Parque Rodó', -34.917, -56.176],
  ['Palermo', -34.916, -56.184], ['Cordón', -34.905, -56.181], ['Centro', -34.905, -56.197],
  ['Ciudad Vieja', -34.907, -56.211], ['Aguada', -34.895, -56.190], ['Tres Cruces', -34.893, -56.169],
  ['Parque Batlle', -34.892, -56.157], ['La Blanqueada', -34.882, -56.158], ['La Comercial', -34.890, -56.176],
  ['Goes', -34.884, -56.181], ['Reducto', -34.886, -56.190], ['Villa Muñoz', -34.880, -56.183],
  ['Brazo Oriental', -34.872, -56.193], ['Atahualpa', -34.870, -56.197], ['Aires Puros', -34.864, -56.190],
  ['Sayago', -34.835, -56.215], ['Belvedere', -34.853, -56.220], ['La Teja', -34.866, -56.232],
  ['Prado', -34.870, -56.198], ['Capurro', -34.880, -56.211], ['Bella Vista', -34.873, -56.215],
  ['Jacinto Vera', -34.881, -56.169], ['Larrañaga', -34.870, -56.176], ['Buceo', -34.903, -56.137],
  ['Malvín', -34.893, -56.123], ['Malvín Norte', -34.876, -56.116], ['Punta Gorda', -34.897, -56.116],
  ['Carrasco', -34.886, -56.057], ['Carrasco Norte', -34.864, -56.060], ['Bañados de Carrasco', -34.870, -56.054],
  ['Maroñas', -34.857, -56.139], ['Ituzaingó', -34.866, -56.105], ['Unión', -34.870, -56.146],
  ['Villa Española', -34.864, -56.158], ['Mercado Modelo', -34.876, -56.165], ['Cerrito de la Victoria', -34.852, -56.176],
  ['Piedras Blancas', -34.836, -56.155], ['Manga', -34.815, -56.143], ['Punta de Rieles', -34.844, -56.117],
  ['Villa García', -34.825, -56.087], ['Flor de Maroñas', -34.852, -56.142], ['Cerro', -34.882, -56.273],
  ['Casabó', -34.875, -56.290], ['Paso Molino', -34.864, -56.214],
];

const TYPE_KEYWORDS = {
  hair:   ['peluqu', 'estilista', 'cabello', 'escuela de peluqu'],
  nails:  ['manic', 'uña', 'pedicur'],
  barber: ['barb'],
  beauty: ['estét', 'beauty', 'spa', 'cosmét', 'depilac', 'belleza', 'esteticista', 'podólog'],
};

const STATE_KEY = (vendedor) => `pbg_prospects_${vendedor}`;

const state = {
  mode: 'barrio',
  data: [],
  filtered: [],
  filters: { tipo: 'all', rating: 0, reviews: 0 },
  sortBy: 'rating',
  userLocation: null,
  markers: [],
  hereMarker: null,
  vendedor: 'VENDEDOR',
  searchQuery: '',
  loaded: false,
  barrioCounts: {},
  savedProspects: {},
  editingPlaceId: null,
  modalDraft: { estado: '', prioridad: 'Media', comentario: '' },
};

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function deburr(s) { return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }
function escapeHtml(str) { return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stateSlug(s) { return deburr(s).replace(/[^a-z]/g, ''); }

function nearestBarrio(lat, lng) {
  let best = null, bestDist = Infinity;
  for (const [name, blat, blng] of MVD_BARRIOS) {
    const d = haversine(lat, lng, blat, blng);
    if (d < bestDist) { bestDist = d; best = name; }
  }
  return bestDist < 4 ? best : 'Otro';
}

function matchesType(rec, typeKey) {
  if (typeKey === 'all') return true;
  const kws = TYPE_KEYWORDS[typeKey] || [];
  const haystack = [rec.categoryName, ...(rec.categories || [])].map(deburr);
  return kws.some(kw => haystack.some(h => h.includes(deburr(kw))));
}

function primaryTypeFor(rec) {
  for (const key of Object.keys(TYPE_KEYWORDS)) if (matchesType(rec, key)) return key;
  return null;
}

function normalizeData(raw) {
  if (!Array.isArray(raw)) { console.error('data.json no es un array'); return []; }
  return raw.map(r => {
    const lat = r.location?.lat ?? r.lat;
    const lng = r.location?.lng ?? r.lng;
    if (typeof lat !== 'number' || typeof lng !== 'number') return null;
    if (r.permanentlyClosed) return null;

    const neighborhood = r.neighborhood || nearestBarrio(lat, lng);
    const phone = r.phone || r.phoneUnformatted || '';
    const category = r.categoryName || (Array.isArray(r.categories) && r.categories[0]) || 'Sin categoría';
    const placeId = r.placeId || `${lat},${lng}`;

    return {
      placeId,
      title: r.title || 'Sin nombre',
      address: r.address || '',
      neighborhood,
      phone,
      website: r.website || '',
      totalScore: Number(r.totalScore) || 0,
      reviewsCount: Number(r.reviewsCount) || 0,
      categoryName: category,
      categories: Array.isArray(r.categories) ? r.categories : [category],
      location: { lat, lng },
      url: r.url || `https://maps.google.com/?q=${lat},${lng}`,
    };
  }).filter(Boolean);
}

function computeBarrioCounts(data) {
  const counts = {};
  for (const r of data) counts[r.neighborhood] = (counts[r.neighborhood] || 0) + 1;
  return counts;
}

function parseParams() {
  const params = new URLSearchParams(window.location.search);
  const vendedor = params.get('vendedor');
  const modo = params.get('modo');
  const zona = params.get('zona');
  if (vendedor) {
    state.vendedor = vendedor.replace(/_/g, ' ').toUpperCase();
    document.getElementById('vendorPill').textContent = state.vendedor;
  }
  if (modo === 'cerca') switchMode('cerca');
  else if (modo === 'mia') switchMode('mia');
  if (zona) {
    document.getElementById('searchInput').value = zona;
    state.searchQuery = zona;
    setTimeout(() => doSearch(), 300);
  }
}

function loadFromLocal() {
  try { const raw = localStorage.getItem(STATE_KEY(state.vendedor)); return raw ? JSON.parse(raw) : {}; }
  catch (e) { return {}; }
}
function saveToLocal() {
  try { localStorage.setItem(STATE_KEY(state.vendedor), JSON.stringify(state.savedProspects)); } catch (e) {}
}

async function fetchRemoteProspects() {
  if (!SHEETS_API_URL) return null;
  try {
    const res = await fetch(`${SHEETS_API_URL}?action=list&vendedor=${encodeURIComponent(state.vendedor)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Respuesta no ok');
    const obj = {};
    for (const p of (json.prospects || [])) {
      obj[p.placeId] = { estado: p.estado, prioridad: p.prioridad, comentario: p.comentario, timestamp: p.timestamp };
    }
    return obj;
  } catch (e) { console.warn('fetchRemoteProspects falló:', e); return null; }
}

async function pushRemoteSave(prospect) {
  if (!SHEETS_API_URL) return { ok: true, offline: true };
  try {
    const res = await fetch(SHEETS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'save', ...prospect }),
    });
    return await res.json();
  } catch (e) { console.warn('pushRemoteSave falló:', e); return { ok: false, error: e.toString() }; }
}

async function pushRemoteDelete(placeId) {
  if (!SHEETS_API_URL) return { ok: true, offline: true };
  try {
    const res = await fetch(SHEETS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete', vendedor: state.vendedor, placeId }),
    });
    return await res.json();
  } catch (e) { console.warn('pushRemoteDelete falló:', e); return { ok: false, error: e.toString() }; }
}

const map = L.map('map', { zoomControl: true, attributionControl: true }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap, © CARTO', maxZoom: 19 }).addTo(map);

function makeIcon(type='prospect', label='') {
  return L.divIcon({ className: '', html: `<div class="custom-marker ${type}"><span>${label}</span></div>`, iconSize: [30, 30], iconAnchor: [15, 30] });
}

function clearMarkers() { state.markers.forEach(m => map.removeLayer(m)); state.markers = []; }

function renderMarkers(salons) {
  clearMarkers();
  salons.forEach((s, idx) => {
    const saved = state.savedProspects[s.placeId];
    const markerClass = saved ? `state-${stateSlug(saved.estado)}` : 'prospect';
    const marker = L.marker([s.location.lat, s.location.lng], { icon: makeIcon(markerClass, idx + 1) }).addTo(map);
    const ratingLine = s.totalScore > 0 ? `★ ${s.totalScore} · ${s.reviewsCount} reviews` : 'Sin reviews';
    const stateLine = saved ? `<br><b>${escapeHtml(saved.estado)}</b>${saved.prioridad ? ` · prioridad ${escapeHtml(saved.prioridad)}` : ''}` : '';
    const popup = `
      <div class="popup-name">${escapeHtml(s.title)}</div>
      <div class="popup-meta">${escapeHtml(s.address)}<br>${ratingLine}${stateLine}</div>
      <div class="popup-actions">
        ${s.phone ? `<a href="tel:${s.phone.replace(/\s/g,'')}">Llamar</a>` : ''}
        <a href="${s.url}" target="_blank" rel="noopener">Maps</a>
        <button onclick="openModalForPlaceId('${s.placeId}')">Marcar</button>
      </div>`;
    marker.bindPopup(popup);
    marker.on('click', () => highlightSalon(idx));
    state.markers.push(marker);
  });
  if (salons.length > 0) {
    const all = [...state.markers];
    if (state.hereMarker) all.push(state.hereMarker);
    const group = L.featureGroup(all);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

function tagClassFor(typeKey) { return typeKey ? `tag-${typeKey}` : ''; }
function tagLabelFor(typeKey) { return { hair: 'Hair', nails: 'Nails', barber: 'Barber', beauty: 'Beauty' }[typeKey] || ''; }

function renderList(salons) {
  const wrap = document.getElementById('resultsWrap');
  document.getElementById('resultCount').textContent = salons.length;
  document.getElementById('miListaCount').textContent = Object.keys(state.savedProspects).length;

  if (!state.loaded) { wrap.innerHTML = '<div class="empty">Cargando datos…</div>'; return; }
  if (salons.length === 0) {
    let hint = 'Sin resultados';
    if (state.mode === 'barrio' && !state.searchQuery) hint = 'Buscá un barrio para empezar';
    else if (state.mode === 'mia') hint = 'Todavía no marcaste ningún salón';
    wrap.innerHTML = `<div class="empty">${hint}</div>`;
    return;
  }

  wrap.innerHTML = salons.map((s, idx) => {
    const typeKey = primaryTypeFor(s);
    const typeLabel = tagLabelFor(typeKey) || s.categoryName;
    const saved = state.savedProspects[s.placeId];
    const slugState = saved ? stateSlug(saved.estado) : '';

    const scoreHtml = s.totalScore > 0
      ? `<div class="score-value">${s.totalScore.toFixed(1)}</div><div class="score-reviews">${s.reviewsCount} rev.</div>`
      : `<div class="score-value muted">—</div><div class="score-reviews">sin reviews</div>`;

    const stateBadge = saved
      ? `<span class="tag tag-state state-${slugState}">${escapeHtml(saved.estado)}</span>${saved.prioridad ? `<span class="tag tag-prio ${deburr(saved.prioridad)}">${escapeHtml(saved.prioridad)}</span>` : ''}`
      : '';

    const commentHtml = (saved && saved.comentario) ? `<div class="salon-comment">${escapeHtml(saved.comentario)}</div>` : '';
    const saveBtnClass = saved ? `save-btn saved state-${slugState}` : 'save-btn';
    const saveBtnLabel = saved ? '✎' : '+';

    return `
      <div class="salon-row" data-idx="${idx}">
        <button class="${saveBtnClass}" data-placeid="${escapeHtml(s.placeId)}" title="Marcar/editar">${saveBtnLabel}</button>
        <div style="min-width:0;">
          <div class="salon-name">${idx + 1}. ${escapeHtml(s.title)}</div>
          <div class="salon-meta">${escapeHtml(s.address)}${s.phone ? ` <span class="sep">·</span> ${escapeHtml(s.phone)}` : ''}</div>
          <div class="salon-tags">
            <span class="tag ${tagClassFor(typeKey)}">${escapeHtml(typeLabel)}</span>
            ${s.neighborhood ? `<span class="tag">${escapeHtml(s.neighborhood)}</span>` : ''}
            ${s.distanceKm !== undefined ? `<span class="tag">${s.distanceKm.toFixed(1)} km</span>` : ''}
            ${stateBadge}
          </div>
          ${commentHtml}
        </div>
        <div class="salon-score">${scoreHtml}</div>
      </div>`;
  }).join('');

  wrap.querySelectorAll('.salon-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.save-btn')) return;
      const idx = parseInt(row.dataset.idx);
      highlightSalon(idx);
      const s = state.filtered[idx];
      map.setView([s.location.lat, s.location.lng], 16);
      state.markers[idx]?.openPopup();
    });
  });

  wrap.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openModalForPlaceId(btn.dataset.placeid);
    });
  });
}

function highlightSalon(idx) {
  document.querySelectorAll('.salon-row').forEach((r, i) => r.classList.toggle('highlighted', i === idx));
  const row = document.querySelector(`.salon-row[data-idx="${idx}"]`);
  if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function applyFilters() {
  let result = [...state.data];

  if (state.mode === 'mia') {
    result = result.filter(s => state.savedProspects[s.placeId]);
  } else if (state.mode === 'cerca' && state.userLocation) {
    result.forEach(s => { s.distanceKm = haversine(state.userLocation.lat, state.userLocation.lng, s.location.lat, s.location.lng); });
    result = result.filter(s => s.distanceKm <= NEARBY_RADIUS_KM);
  } else if (state.mode === 'barrio' && state.searchQuery) {
    const q = deburr(state.searchQuery.trim());
    result = result.filter(s => deburr(s.neighborhood).includes(q) || deburr(s.address).includes(q) || deburr(s.title).includes(q));
  } else if (state.mode === 'barrio' && !state.searchQuery) {
    result = [];
  }

  if (state.filters.tipo !== 'all') result = result.filter(s => matchesType(s, state.filters.tipo));
  if (state.filters.rating > 0) result = result.filter(s => s.totalScore >= state.filters.rating);
  if (state.filters.reviews > 0) result = result.filter(s => s.reviewsCount >= state.filters.reviews);

  if (state.sortBy === 'distance' && state.mode === 'cerca') result.sort((a, b) => a.distanceKm - b.distanceKm);
  else if (state.sortBy === 'rating') result.sort((a, b) => b.totalScore - a.totalScore || b.reviewsCount - a.reviewsCount);
  else if (state.sortBy === 'reviews') result.sort((a, b) => b.reviewsCount - a.reviewsCount);
  else if (state.sortBy === 'name') result.sort((a, b) => a.title.localeCompare(b.title));
  else if (state.sortBy === 'estado' && state.mode === 'mia') {
    const order = { 'interes': 0, 'potencial': 1, 'visitado': 2, 'descartado': 3 };
    result.sort((a, b) => {
      const ea = state.savedProspects[a.placeId]?.estado || '';
      const eb = state.savedProspects[b.placeId]?.estado || '';
      return (order[stateSlug(ea)] ?? 9) - (order[stateSlug(eb)] ?? 9);
    });
  }

  state.filtered = result;
  updateMeta();
  renderMarkers(result);
  renderList(result);
}

function updateMeta() {
  if (!state.loaded) { document.getElementById('resultMeta').textContent = 'Cargando…'; return; }
  const labels = { rating: 'Orden: rating', reviews: 'Orden: reviews', distance: 'Orden: distancia', name: 'Orden: A-Z', estado: 'Orden: estado' };
  document.getElementById('resultMeta').textContent = labels[state.sortBy] || '';
}

function renderAutocomplete(query) {
  const ac = document.getElementById('autocomplete');
  const q = deburr(query.trim());
  if (!q) { ac.classList.remove('show'); return; }
  const matches = Object.entries(state.barrioCounts).filter(([name]) => deburr(name).includes(q)).sort((a, b) => b[1] - a[1]).slice(0, 6);
  if (matches.length === 0) { ac.classList.remove('show'); return; }
  ac.innerHTML = matches.map(([name, count]) => `
    <div class="autocomplete-item" data-barrio="${escapeHtml(name)}">
      <span>${escapeHtml(name)}</span>
      <span class="autocomplete-count">${count}</span>
    </div>`).join('');
  ac.classList.add('show');
  ac.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('click', () => {
      document.getElementById('searchInput').value = item.dataset.barrio;
      ac.classList.remove('show');
      doSearch();
    });
  });
}

function switchMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const searchRow = document.getElementById('searchRow');
  if (mode === 'cerca') {
    searchRow.style.display = 'none';
    state.sortBy = 'distance';
    requestLocation();
  } else if (mode === 'mia') {
    searchRow.style.display = 'none';
    state.sortBy = 'estado';
    if (state.hereMarker) { map.removeLayer(state.hereMarker); state.hereMarker = null; }
    applyFilters();
  } else {
    searchRow.style.display = 'flex';
    if (state.hereMarker) { map.removeLayer(state.hereMarker); state.hereMarker = null; }
    state.userLocation = null;
    state.sortBy = 'rating';
    applyFilters();
  }
}

function requestLocation() {
  if (!navigator.geolocation) { toast('Geolocalización no disponible'); return; }
  toast('Obteniendo ubicación…');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (state.hereMarker) map.removeLayer(state.hereMarker);
      const hereIcon = L.divIcon({ className: '', html: `<div class="custom-marker here"><span>★</span></div>`, iconSize: [30, 30], iconAnchor: [15, 30] });
      state.hereMarker = L.marker([state.userLocation.lat, state.userLocation.lng], { icon: hereIcon }).addTo(map);
      map.setView([state.userLocation.lat, state.userLocation.lng], 15);
      applyFilters();
    },
    (err) => { toast('No se pudo obtener ubicación'); console.error(err); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function doSearch() {
  state.searchQuery = document.getElementById('searchInput').value.trim();
  document.getElementById('autocomplete').classList.remove('show');
  applyFilters();
}

function openModalForPlaceId(placeId) {
  const salon = state.data.find(s => s.placeId === placeId);
  if (!salon) return;
  state.editingPlaceId = placeId;
  const existing = state.savedProspects[placeId] || {};
  state.modalDraft = {
    estado: existing.estado || '',
    prioridad: existing.prioridad || 'Media',
    comentario: existing.comentario || '',
  };

  document.getElementById('modalTitle').textContent = salon.title;
  document.getElementById('modalSubtitle').textContent = salon.address + (salon.neighborhood ? ` · ${salon.neighborhood}` : '');
  document.getElementById('modalComentario').value = state.modalDraft.comentario;

  document.querySelectorAll('#estadoOptions .modal-opt').forEach(opt => opt.classList.toggle('active', opt.dataset.estado === state.modalDraft.estado));
  document.querySelectorAll('#prioOptions .modal-opt').forEach(opt => opt.classList.toggle('active', opt.dataset.prio === state.modalDraft.prioridad));

  document.getElementById('modalDelete').style.display = state.savedProspects[placeId] ? 'inline-block' : 'none';
  document.getElementById('modalBackdrop').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  state.editingPlaceId = null;
}

async function saveFromModal() {
  if (!state.editingPlaceId) return;
  if (!state.modalDraft.estado) { toast('Elegí un estado'); return; }

  const salon = state.data.find(s => s.placeId === state.editingPlaceId);
  if (!salon) return;
  const comentario = document.getElementById('modalComentario').value.trim();
  state.modalDraft.comentario = comentario;

  const record = {
    vendedor: state.vendedor, placeId: salon.placeId, salon: salon.title,
    direccion: salon.address, barrio: salon.neighborhood, telefono: salon.phone,
    rating: salon.totalScore, reviews: salon.reviewsCount, categoria: salon.categoryName,
    lat: salon.location.lat, lng: salon.location.lng,
    estado: state.modalDraft.estado, prioridad: state.modalDraft.prioridad,
    comentario, url: salon.url,
  };

  state.savedProspects[salon.placeId] = {
    estado: record.estado, prioridad: record.prioridad, comentario: record.comentario,
    timestamp: new Date().toISOString(),
  };
  saveToLocal();
  closeModal();
  applyFilters();
  toast('Guardado localmente…');

  const result = await pushRemoteSave(record);
  if (result.ok) toast(result.offline ? 'Guardado (modo local)' : 'Guardado en Sheets ✓');
  else toast('Error remoto, guardado solo local');
}

async function deleteFromModal() {
  if (!state.editingPlaceId) return;
  if (!confirm('¿Eliminar este prospecto guardado?')) return;
  const placeId = state.editingPlaceId;
  delete state.savedProspects[placeId];
  saveToLocal();
  closeModal();
  applyFilters();
  toast('Eliminado localmente…');
  const result = await pushRemoteDelete(placeId);
  if (result.ok) toast(result.offline ? 'Eliminado (modo local)' : 'Eliminado de Sheets ✓');
  else toast('Error remoto, eliminado solo local');
}

async function exportPDF() {
  if (state.filtered.length === 0) { toast('No hay salones para exportar'); return; }
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  try {
    await new Promise(r => setTimeout(r, 300));
    const mapEl = document.getElementById('map');
    const canvas = await html2canvas(mapEl, { useCORS: true, allowTaint: true, logging: false, backgroundColor: '#F5F5F7' });
    const mapImg = canvas.toDataURL('image/jpeg', 0.85);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const margin = 14;

    // HEADER blanco con borde rojo abajo (estilo 360 CBD)
    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, pageW, 22, 'F');
    doc.setFillColor(184, 58, 69);
    doc.rect(0, 22, pageW, 1, 'F');

    doc.setTextColor(184, 58, 69);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.text('360 CBD', margin, 13);
    doc.setTextColor(92, 92, 94);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    const titleSuffix = state.mode === 'mia' ? '· Mi lista' : '· Prospectos';
    doc.text(titleSuffix, margin + 22, 13);

    doc.setFontSize(8);
    doc.setTextColor(140, 140, 140);
    const fecha = new Date().toLocaleString('es-UY', { dateStyle: 'short', timeStyle: 'short' });
    doc.text(`${state.vendedor}  ·  ${fecha}`, pageW - margin, 13, { align: 'right' });

    doc.setTextColor(60, 60, 60);
    doc.setFontSize(9);
    let contextLine = '';
    if (state.mode === 'cerca' && state.userLocation) contextLine = `Cerca de mí (radio ${NEARBY_RADIUS_KM} km)`;
    else if (state.mode === 'mia') contextLine = `Mi lista (${Object.keys(state.savedProspects).length} guardados)`;
    else if (state.searchQuery) contextLine = `Búsqueda: "${state.searchQuery}"`;
    if (state.filters.tipo !== 'all') contextLine += `  ·  Tipo: ${tagLabelFor(state.filters.tipo)}`;
    if (state.filters.rating > 0) contextLine += `  ·  Rating ≥ ${state.filters.rating}`;
    if (state.filters.reviews > 0) contextLine += `  ·  Reviews ≥ ${state.filters.reviews}`;
    doc.text(contextLine, margin, 30);
    doc.setFontSize(11);
    doc.setTextColor(184, 58, 69);
    doc.setFont('helvetica', 'bold');
    doc.text(`${state.filtered.length} salones`, pageW - margin, 30, { align: 'right' });

    const mapW = pageW - margin * 2;
    const mapH = mapW * (canvas.height / canvas.width);
    const mapHCapped = Math.min(mapH, 85);
    doc.addImage(mapImg, 'JPEG', margin, 34, mapW, mapHCapped);

    const tableStartY = 34 + mapHCapped + 6;
    const isMiLista = state.mode === 'mia';
    const head = isMiLista
      ? [['#', 'Salón', 'Dirección', 'Tel', 'Barrio', 'Estado', 'Prio', 'Comentario']]
      : [['#', 'Salón', 'Dirección', 'Teléfono', '★', 'Rev.', 'Tipo', state.mode === 'cerca' ? 'Dist.' : 'Barrio']];

    const rows = state.filtered.map((s, i) => {
      const saved = state.savedProspects[s.placeId];
      if (isMiLista) {
        return [i + 1, s.title, s.address, s.phone || '—', s.neighborhood || '—', saved?.estado || '—', saved?.prioridad || '—', saved?.comentario || ''];
      }
      return [i + 1, s.title, s.address, s.phone || '—',
        s.totalScore > 0 ? s.totalScore.toFixed(1) : '—',
        s.reviewsCount || '—', s.categoryName,
        state.mode === 'cerca' && s.distanceKm !== undefined ? s.distanceKm.toFixed(1) + ' km' : (s.neighborhood || '—')];
    });

    const colStyles = isMiLista ? {
      0: { cellWidth: 7, halign: 'center' },
      1: { cellWidth: 32, fontStyle: 'bold' },
      2: { cellWidth: 38 }, 3: { cellWidth: 22 },
      4: { cellWidth: 18 },
      5: { cellWidth: 16, fontStyle: 'bold', textColor: [184, 58, 69] },
      6: { cellWidth: 12 }, 7: { cellWidth: 'auto' },
    } : {
      0: { cellWidth: 7, halign: 'center' },
      1: { cellWidth: 38, fontStyle: 'bold' },
      2: { cellWidth: 48 }, 3: { cellWidth: 26 },
      4: { cellWidth: 9, halign: 'center', textColor: [184, 58, 69], fontStyle: 'bold' },
      5: { cellWidth: 11, halign: 'center' },
      6: { cellWidth: 18 }, 7: { cellWidth: 'auto' },
    };

    doc.autoTable({
      startY: tableStartY, head, body: rows, theme: 'plain',
      styles: { font: 'helvetica', fontSize: 8, cellPadding: 2.5, lineColor: [229, 229, 234], lineWidth: 0.1, textColor: [44, 44, 46] },
      headStyles: { fillColor: [44, 44, 46], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 8, cellPadding: 3 },
      alternateRowStyles: { fillColor: [245, 245, 247] },
      columnStyles: colStyles,
      didDrawPage: (data) => {
        const pH = doc.internal.pageSize.getHeight();
        doc.setFontSize(7);
        doc.setTextColor(140, 140, 140);
        doc.text(`360 CBD · Prospectos · ${state.vendedor}`, margin, pH - 6);
        doc.text(`Página ${data.pageNumber}`, pageW - margin, pH - 6, { align: 'right' });
      },
    });

    const zona = state.mode === 'mia' ? 'milista' : (state.searchQuery || (state.mode === 'cerca' ? 'cerca' : 'general'));
    const safeZona = zona.replace(/[^a-zA-Z0-9]/g, '_');
    const safeVendor = state.vendedor.replace(/[^a-zA-Z0-9]/g, '_');
    doc.save(`360CBD_prospectos_${safeVendor}_${safeZona}_${new Date().toISOString().slice(0,10)}.pdf`);
    toast('PDF generado');
  } catch (e) {
    console.error(e);
    toast('Error al generar PDF');
  } finally {
    loading.classList.remove('show');
  }
}

document.querySelectorAll('.mode-tab').forEach(tab => tab.addEventListener('click', () => switchMode(tab.dataset.mode)));
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input', (e) => renderAutocomplete(e.target.value));
document.getElementById('searchInput').addEventListener('blur', () => setTimeout(() => document.getElementById('autocomplete').classList.remove('show'), 200));
document.getElementById('searchInput').addEventListener('focus', (e) => { if (e.target.value) renderAutocomplete(e.target.value); });

document.getElementById('filters').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  const filter = chip.dataset.filter;
  const value = chip.dataset.value;
  if (filter === 'tipo') {
    document.querySelectorAll('[data-filter="tipo"]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.filters.tipo = value;
  } else if (filter === 'rating') {
    const isActive = chip.classList.contains('active');
    document.querySelectorAll('[data-filter="rating"]').forEach(c => c.classList.remove('active'));
    if (!isActive) { chip.classList.add('active'); state.filters.rating = parseFloat(value); } else { state.filters.rating = 0; }
  } else if (filter === 'reviews') {
    const isActive = chip.classList.contains('active');
    document.querySelectorAll('[data-filter="reviews"]').forEach(c => c.classList.remove('active'));
    if (!isActive) { chip.classList.add('active'); state.filters.reviews = parseInt(value); } else { state.filters.reviews = 0; }
  }
  applyFilters();
});

document.getElementById('exportBtn').addEventListener('click', exportPDF);
document.getElementById('sortBtn').addEventListener('click', () => {
  const options = state.mode === 'cerca' ? ['distance', 'rating', 'reviews', 'name']
    : state.mode === 'mia' ? ['estado', 'rating', 'name']
    : ['rating', 'reviews', 'name'];
  const current = options.indexOf(state.sortBy);
  state.sortBy = options[(current + 1) % options.length];
  applyFilters();
});

document.getElementById('estadoOptions').addEventListener('click', (e) => {
  const opt = e.target.closest('.modal-opt'); if (!opt) return;
  document.querySelectorAll('#estadoOptions .modal-opt').forEach(o => o.classList.remove('active'));
  opt.classList.add('active');
  state.modalDraft.estado = opt.dataset.estado;
});
document.getElementById('prioOptions').addEventListener('click', (e) => {
  const opt = e.target.closest('.modal-opt'); if (!opt) return;
  document.querySelectorAll('#prioOptions .modal-opt').forEach(o => o.classList.remove('active'));
  opt.classList.add('active');
  state.modalDraft.prioridad = opt.dataset.prio;
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveFromModal);
document.getElementById('modalDelete').addEventListener('click', deleteFromModal);
document.getElementById('modalBackdrop').addEventListener('click', (e) => { if (e.target.id === 'modalBackdrop') closeModal(); });

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

async function init() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status} al cargar ${DATA_URL}`);
    const raw = await res.json();
    state.data = normalizeData(raw);
    state.barrioCounts = computeBarrioCounts(state.data);
    state.loaded = true;
    parseParams();

    state.savedProspects = loadFromLocal();
    const remote = await fetchRemoteProspects();
    if (remote) { state.savedProspects = remote; saveToLocal(); }

    if (state.data.length === 0) toast('data.json vacío');
    else {
      const savedCount = Object.keys(state.savedProspects).length;
      toast(`${state.data.length} salones · ${savedCount} guardados`);
    }
    applyFilters();
  } catch (e) {
    console.error(e);
    state.loaded = true;
    const hint = location.protocol === 'file:' ? 'Abrí desde un servidor (no file://)' : 'Verificá que data.json esté junto al index.html';
    document.getElementById('resultsWrap').innerHTML = `<div class="empty">No se pudo cargar data.json<br><small style="font-size:12px; opacity:0.7">${hint}</small></div>`;
    document.getElementById('resultMeta').textContent = 'Error de carga';
    toast('Error: no se pudo cargar data.json');
  }
}

init();
</script>
</body>
